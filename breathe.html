<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Breathe – epsiCTRON</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; }
    @keyframes floatParticle {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.3; }
      50% { transform: translateY(-20px) scale(1.3); opacity: 0.7; }
    }
    @keyframes breathePulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Nav overlay */
    .nav-overlay {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      padding: 0 5%;
      display: flex; align-items: center; justify-content: space-between;
      height: 48px;
      background: rgba(10, 8, 5, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(200,165,100,0.08);
    }
    .nav-logo {
      font-family: 'Nunito', sans-serif; font-weight: 400;
      font-size: 0.85rem; color: rgba(210,180,130,0.7);
      text-decoration: none; letter-spacing: 3px; text-transform: uppercase;
    }
    .nav-logo:hover { color: rgba(210,180,130,1); }
    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a {
      color: rgba(210,180,130,0.5); text-decoration: none;
      font-family: 'Nunito', sans-serif; font-size: 0.75rem;
      font-weight: 300; letter-spacing: 2px; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: rgba(210,180,130,0.9); }
    @media(max-width:520px){ .nav-links { display: none; } }
  </style>
</head>
<body>
  <nav class="nav-overlay">
    <a class="nav-logo" href="index.html">epsiCTRON</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="resume.html">Resume</a></li>
      <li><a href="breathe.html" class="active">Breathe</a></li>
    </ul>
  </nav>

  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const PHASES = {
      IDLE: "idle",
      INHALE_SLOW: "inhale_slow",
      INHALE_BURST: "inhale_burst",
      EXHALE: "exhale",
    };

    function BreathingExercise() {
      const [duration, setDuration] = useState(6);
      const [sessionMinutes, setSessionMinutes] = useState(10);
      const [phase, setPhase] = useState(PHASES.IDLE);
      const [isRunning, setIsRunning] = useState(false);
      const [timeLeft, setTimeLeft] = useState(0);
      const [sessionTimeLeft, setSessionTimeLeft] = useState(0);
      const animRef = useRef(null);
      const startTimeRef = useRef(null);
      const phaseRef = useRef(PHASES.IDLE);
      const durationRef = useRef(duration);
      const sessionTimerRef = useRef(null);
      const sessionStartRef = useRef(null);
      const sessionDurationRef = useRef(0);

      useEffect(() => { durationRef.current = duration; }, [duration]);

      const getPhaseProgress = useCallback(() => {
        if (phase === PHASES.IDLE) return 0;
        const d = durationRef.current;
        const elapsed = timeLeft;
        if (phase === PHASES.INHALE_SLOW) {
          const slowDur = d - 1;
          const remaining = elapsed;
          return remaining > 1 ? (1 - (remaining - 1) / slowDur) * 0.75 : 0.75;
        }
        if (phase === PHASES.INHALE_BURST) return 0.75 + (1 - elapsed) * 0.25;
        if (phase === PHASES.EXHALE) return elapsed / d;
        return 0;
      }, [phase, timeLeft]);

      const runCycle = useCallback(() => {
        const d = durationRef.current;
        setPhase(PHASES.INHALE_SLOW);
        phaseRef.current = PHASES.INHALE_SLOW;
        setTimeLeft(d);
        const slowInhaleDur = (d - 1) * 1000;
        const burstDur = 1000;
        const exhaleDur = d * 1000;
        startTimeRef.current = performance.now();

        return new Promise((resolve) => {
          let currentInterval = setInterval(() => {
            const elapsed = performance.now() - startTimeRef.current;
            setTimeLeft(Math.max(0, d - elapsed / 1000));
          }, 50);

          const burstTimeout = setTimeout(() => {
            clearInterval(currentInterval);
            setPhase(PHASES.INHALE_BURST);
            phaseRef.current = PHASES.INHALE_BURST;
            setTimeLeft(1);
            startTimeRef.current = performance.now();
            currentInterval = setInterval(() => {
              const elapsed = performance.now() - startTimeRef.current;
              setTimeLeft(Math.max(0, 1 - elapsed / 1000));
            }, 50);
          }, slowInhaleDur);

          const exhaleTimeout = setTimeout(() => {
            clearInterval(currentInterval);
            setPhase(PHASES.EXHALE);
            phaseRef.current = PHASES.EXHALE;
            setTimeLeft(d);
            startTimeRef.current = performance.now();
            currentInterval = setInterval(() => {
              const elapsed = performance.now() - startTimeRef.current;
              setTimeLeft(Math.max(0, d - elapsed / 1000));
            }, 50);
            const endTimeout = setTimeout(() => {
              clearInterval(currentInterval);
              setTimeLeft(0);
              resolve();
            }, exhaleDur);
            animRef.current = { intervals: [], timeouts: [endTimeout], clearCurrent: () => clearInterval(currentInterval) };
          }, slowInhaleDur + burstDur);

          animRef.current = { intervals: [], timeouts: [burstTimeout, exhaleTimeout], clearCurrent: () => clearInterval(currentInterval) };
        });
      }, []);

      const startBreathing = useCallback(async () => {
        setIsRunning(true);
        const totalSeconds = sessionMinutes * 60;
        setSessionTimeLeft(totalSeconds);
        sessionDurationRef.current = totalSeconds;
        sessionStartRef.current = performance.now();
        sessionTimerRef.current = setInterval(() => {
          const elapsed = (performance.now() - sessionStartRef.current) / 1000;
          const remaining = Math.max(0, sessionDurationRef.current - elapsed);
          setSessionTimeLeft(remaining);
          if (remaining <= 0) phaseRef.current = PHASES.IDLE;
        }, 200);
        const run = async () => {
          await runCycle();
          if (phaseRef.current !== PHASES.IDLE) await run();
        };
        await run();
        setIsRunning(false);
        setPhase(PHASES.IDLE);
        phaseRef.current = PHASES.IDLE;
        setTimeLeft(0);
        setSessionTimeLeft(0);
        if (sessionTimerRef.current) { clearInterval(sessionTimerRef.current); sessionTimerRef.current = null; }
      }, [runCycle, sessionMinutes]);

      const stopBreathing = useCallback(() => {
        setIsRunning(false);
        setPhase(PHASES.IDLE);
        phaseRef.current = PHASES.IDLE;
        setTimeLeft(0);
        setSessionTimeLeft(0);
        if (sessionTimerRef.current) { clearInterval(sessionTimerRef.current); sessionTimerRef.current = null; }
        if (animRef.current) {
          (animRef.current.intervals || []).forEach(clearInterval);
          (animRef.current.timeouts || []).forEach(clearTimeout);
          if (animRef.current.clearCurrent) animRef.current.clearCurrent();
        }
      }, []);

      const progress = getPhaseProgress();
      const scale = phase === PHASES.IDLE ? 0.35 : 0.3 + progress * 0.7;
      const glowIntensity = phase === PHASES.IDLE ? 15 : 15 + progress * 50;
      const glowColor = phase === PHASES.INHALE_BURST ? "rgba(220,140,140,0.5)" : "rgba(230,180,100,0.5)";
      const circleColor = phase === PHASES.INHALE_BURST ? "rgba(220,120,120,0.25)" : "rgba(220,170,90,0.2)";
      const transitionSpeed = phase === PHASES.INHALE_BURST ? "0.15s" : "0.3s";

      const formatTime = (s) => {
        const sec = Math.ceil(s);
        return Math.floor(sec / 60) + ":" + String(sec % 60).padStart(2, "0");
      };

      const particles = Array.from({ length: 12 }, (_, i) => i);

      return (
        <div style={{
          minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center",
          justifyContent: "center", background: "radial-gradient(ellipse at 50% 50%, #1a1612 0%, #0f0d0a 100%)",
          fontFamily: "'Nunito', sans-serif", color: "#d4c4a8", position: "relative", overflow: "hidden", padding: 20,
        }}>
          {particles.map(i => (
            <div key={i} style={{
              position: "absolute", width: 2 + (i % 3) * 2, height: 2 + (i % 3) * 2, borderRadius: "50%",
              background: `rgba(220,180,120,${0.08 + (i % 4) * 0.04})`,
              left: `${8 + (i * 7.3) % 84}%`, top: `${5 + (i * 11.7) % 85}%`,
              animation: `floatParticle ${6 + (i % 4) * 2}s ease-in-out infinite`,
              animationDelay: `${i * 0.7}s`,
            }} />
          ))}

          <div style={{ position: "absolute", top: 64, textAlign: "center", animation: "fadeInUp 1s ease" }}>
            <h1 style={{
              fontSize: 28, fontWeight: 300, letterSpacing: 6, textTransform: "uppercase",
              margin: 0, color: "rgba(210,180,130,0.6)", fontFamily: "'Nunito', sans-serif",
            }}>Breathe</h1>
          </div>

          <div style={{ position: "relative", width: 280, height: 280, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 40 }}>
            {/* Outer ring */}
            <div style={{
              position: "absolute", width: "100%", height: "100%", borderRadius: "50%",
              border: `5px solid rgba(200,165,100,${scale > 0.95 ? 0.5 : isRunning ? 0.2 : 0.12})`,
              boxShadow: scale > 0.95 ? "0 0 30px rgba(200,165,100,0.2), inset 0 0 30px rgba(200,165,100,0.06)"
                : isRunning ? "0 0 20px rgba(200,165,100,0.06), inset 0 0 20px rgba(200,165,100,0.02)" : "none",
              transition: "border-color 0.3s ease, box-shadow 0.3s ease",
            }} />
            {/* Breathing circle */}
            <div style={{
              width: "100%", height: "100%", borderRadius: "50%", background: circleColor,
              border: phase === PHASES.INHALE_BURST ? "4px solid rgba(220,140,140,0.45)" : "4px solid rgba(210,170,100,0.3)",
              transform: `scale(${scale})`,
              transition: `transform ${transitionSpeed} ease-out, box-shadow ${transitionSpeed} ease-out, background 0.3s ease, border 0.3s ease`,
              boxShadow: `0 0 ${glowIntensity}px ${glowColor}`,
              animation: phase === PHASES.IDLE ? "breathePulse 4s ease-in-out infinite" : "none",
            }} />
            {/* Inner timer */}
            <div style={{
              position: "absolute", width: 110, height: 110, borderRadius: "50%",
              border: "5px solid rgba(200,165,100,0.15)", background: "rgba(180,140,80,0.06)",
              pointerEvents: "none", display: "flex", alignItems: "center", justifyContent: "center",
            }}>
              <div style={{
                fontSize: 24, fontWeight: 300, fontFamily: "'Nunito', sans-serif",
                color: "rgba(230,210,170,0.9)", lineHeight: 1, textShadow: "0 0 15px rgba(210,170,100,0.3)", letterSpacing: 2,
              }}>
                {phase === PHASES.IDLE ? `${sessionMinutes}:00` : formatTime(sessionTimeLeft)}
              </div>
            </div>
          </div>

          <div style={{
            textAlign: "center", marginBottom: 40, minHeight: 44,
            fontFamily: "'Nunito', sans-serif",
          }}>
            <div style={{ fontSize: 16, fontWeight: 300, letterSpacing: 3, textTransform: "uppercase", color: "rgba(210,180,130,0.6)" }}>
              {phase === PHASES.IDLE && "Ready"}
              {phase === PHASES.INHALE_SLOW && "Inhale"}
              {phase === PHASES.INHALE_BURST && "Inhale"}
              {phase === PHASES.EXHALE && "Exhale"}
            </div>
            <div style={{ fontSize: 11, fontWeight: 300, letterSpacing: 2, textTransform: "uppercase", color: "rgba(210,180,130,0.35)", marginTop: 6 }}>
              {phase === PHASES.INHALE_SLOW && "slowly · through nose"}
              {phase === PHASES.INHALE_BURST && "sharp burst · through nose"}
              {phase === PHASES.EXHALE && "through mouth"}
            </div>
          </div>

          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 28, minHeight: 120 }}>
            <div style={{
              display: "flex", gap: 24, alignItems: "center",
              opacity: isRunning ? 0 : 1, transition: "opacity 0.4s ease",
              pointerEvents: isRunning ? "none" : "auto", height: 52,
            }}>
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 10, fontFamily: "'Nunito', sans-serif", fontWeight: 300, letterSpacing: 2, textTransform: "uppercase", color: "rgba(180,155,110,0.4)", marginBottom: 8 }}>Session</div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => setSessionMinutes(Math.max(1, sessionMinutes - 1))} style={{ width: 28, height: 28, borderRadius: "50%", border: "1px solid rgba(200,165,100,0.15)", background: "transparent", color: "rgba(210,180,130,0.6)", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                  <span style={{ fontSize: 20, fontFamily: "'Nunito', sans-serif", fontWeight: 300, color: "rgba(230,210,170,0.9)", minWidth: 56, textAlign: "center" }}>{sessionMinutes} min</span>
                  <button onClick={() => setSessionMinutes(Math.min(30, sessionMinutes + 1))} style={{ width: 28, height: 28, borderRadius: "50%", border: "1px solid rgba(200,165,100,0.15)", background: "transparent", color: "rgba(210,180,130,0.6)", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                </div>
              </div>
              <div style={{ width: 1, height: 36, background: "rgba(200,165,100,0.1)" }} />
              <div style={{ textAlign: "center" }}>
                <div style={{ fontSize: 10, fontFamily: "'Nunito', sans-serif", fontWeight: 300, letterSpacing: 2, textTransform: "uppercase", color: "rgba(180,155,110,0.4)", marginBottom: 8 }}>Breath</div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <button onClick={() => setDuration(Math.max(3, duration - 1))} style={{ width: 28, height: 28, borderRadius: "50%", border: "1px solid rgba(200,165,100,0.15)", background: "transparent", color: "rgba(210,180,130,0.6)", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                  <span style={{ fontSize: 20, fontFamily: "'Nunito', sans-serif", fontWeight: 300, color: "rgba(230,210,170,0.9)", minWidth: 30, textAlign: "center" }}>{duration}s</span>
                  <button onClick={() => setDuration(Math.min(12, duration + 1))} style={{ width: 28, height: 28, borderRadius: "50%", border: "1px solid rgba(200,165,100,0.15)", background: "transparent", color: "rgba(210,180,130,0.6)", fontSize: 16, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                </div>
              </div>
            </div>

            <button onClick={isRunning ? stopBreathing : startBreathing} style={{
              padding: "12px 36px", borderRadius: 24,
              border: isRunning ? "1px solid rgba(255,130,130,0.2)" : "1px solid rgba(200,165,100,0.2)",
              background: isRunning ? "rgba(255,100,100,0.08)" : "rgba(200,165,100,0.08)",
              color: isRunning ? "rgba(255,160,160,0.8)" : "rgba(220,190,140,0.8)",
              fontSize: 13, fontFamily: "'Nunito', sans-serif", fontWeight: 400,
              letterSpacing: 3, textTransform: "uppercase", cursor: "pointer", transition: "all 0.3s ease",
            }}>
              {isRunning ? "Stop" : "Start"}
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<BreathingExercise />);
  </script>
</body>
</html>
